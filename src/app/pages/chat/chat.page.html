<ion-header class="ion-no-border">
  <ion-toolbar class="chat-toolbar">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/tabs/dashboard" text="" icon="arrow-back" color="light"></ion-back-button>
    </ion-buttons>
    <div class="chat-header-info">
      <div class="ai-avatar-small">🤖</div>
      <div>
        <div class="chat-title">EatWell AI</div>
        <div class="chat-status">Online • Nutrition Assistant</div>
      </div>
    </div>
    <ion-buttons slot="end">
      <ion-button (click)="clearChat()" color="light">
        <ion-icon name="trash-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="chat-content" #chatContent>

  <!-- Welcome Message -->
  <div class="welcome-card" *ngIf="messages.length === 0">
    <div class="ai-avatar-large">🤖</div>
    <h3>Hi {{ username }}! 👋</h3>
    <p>I'm your AI nutrition assistant. Ask me anything about food, meals, and healthy eating!</p>
    <div class="quick-actions">
      <button class="quick-btn" (click)="sendQuick('What should I eat for dinner?')">🍽️ Dinner ideas</button>
      <button class="quick-btn" (click)="sendQuick('Suggest a healthy snack')">🍎 Healthy snack</button>
      <button class="quick-btn" (click)="sendQuick('How many calories should I eat today?')">📊 My calories</button>
      <button class="quick-btn" (click)="sendQuick('Give me a South Indian breakfast')">🥘 Breakfast</button>
      <button class="quick-btn" (click)="sendQuick('Plan my meals for today')">📋 Today\'s plan</button>
      <button class="quick-btn" (click)="sendQuick('What foods help with weight loss?')">💪 Weight loss tips</button>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages-container">
    <div *ngFor="let msg of messages" class="message-row" [class.user-row]="msg.role === 'user'" [class.ai-row]="msg.role === 'ai'">
      <div class="ai-dot" *ngIf="msg.role === 'ai'">🤖</div>
      <div class="message-bubble" [class.user-bubble]="msg.role === 'user'" [class.ai-bubble]="msg.role === 'ai'">
        <div class="message-text" [innerHTML]="formatMessage(msg.text)"></div>
        <div class="message-time">{{ msg.time }}</div>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="message-row ai-row" *ngIf="isTyping">
      <div class="ai-dot">🤖</div>
      <div class="message-bubble ai-bubble typing-bubble">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>
  </div>

</ion-content>

<!-- Input Bar -->
<ion-footer class="ion-no-border">
  <div class="input-bar">
    <input
      type="text"
      [(ngModel)]="userInput"
      placeholder="Ask about meals, nutrition..."
      (keyup.enter)="send()"
      [disabled]="isTyping"
      class="chat-input"
    >
    <button class="send-btn" (click)="send()" [disabled]="!userInput.trim() || isTyping">
      <ion-icon name="send"></ion-icon>
    </button>
  </div>
</ion-footer>
